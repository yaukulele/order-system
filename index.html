<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📦 訂單管理系統 — MOMO / PChome</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f4f3ee;--sf:#fff;--sf2:#faf9f5;--bd:#ddd9cf;--tx:#1c1b18;--dm:#807b6f;--ht:#b0aa9c;--mo:#d6336c;--mo-bg:#fdf0f5;--pc:#c0392b;--pc-bg:#fef0ee;--grn:#2d7a4f;--grn-bg:#eef7f1;--amb:#b8860b;--blu:#2563eb;--mono:'Menlo','Consolas','Courier New',monospace;--sans:-apple-system,BlinkMacSystemFont,'Noto Sans TC','Segoe UI',sans-serif}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh}
.hdr{background:var(--sf);border-bottom:1px solid var(--bd);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hdr h1{font-size:16px;font-weight:800}.hdr h1 small{font-weight:400;color:var(--dm);font-size:11px;margin-left:6px}
.sync-dot{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px}
.sync-on{background:var(--grn-bg);color:var(--grn)}.sync-off{background:#fef9ec;color:var(--amb)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}.dot-on{background:var(--grn)}.dot-off{background:var(--amb);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes flashRed{0%,100%{background:#fef2f2}50%{background:#fecaca}}
.row-missing-track{animation:flashRed 1.6s ease-in-out infinite}
.row-group-h{background:#f8f7f3;font-weight:700;color:var(--dm);font-size:11px}
.row-group-h td{padding:8px 12px;border-top:2px solid var(--bd);border-bottom:1px solid var(--bd)}
.batch-bar{position:fixed;bottom:0;left:0;right:0;background:var(--tx);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:10px;z-index:90;box-shadow:0 -4px 12px rgba(0,0,0,.15)}
.batch-bar.hidden{display:none}
.batch-bar button{background:var(--sf);color:var(--tx);border:0;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.batch-bar button:hover{background:#fff}
.batch-bar button.danger{background:var(--pc);color:#fff}
.batch-cell{width:24px;text-align:center}
.batch-cell input{cursor:pointer;width:14px;height:14px}
.tabs{background:var(--sf);border-bottom:1px solid var(--bd);padding:0 20px;display:flex;gap:0;overflow-x:auto}
.tab{padding:10px 16px;font-size:13px;font-weight:600;color:var(--dm);cursor:pointer;border:none;background:none;font-family:var(--sans);border-bottom:2px solid transparent}.tab.active{color:var(--tx);border-bottom-color:var(--grn)}.tab:hover:not(.active){color:var(--tx)}
.badge{display:inline-block;background:var(--grn-bg);color:var(--grn);padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700;margin-left:4px;font-family:var(--mono)}
.main{max-width:1100px;margin:0 auto;padding:16px 20px}.hidden{display:none!important}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:14px}
.card-h{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-h h3{font-size:14px;font-weight:700}.card-b{padding:16px}
.btn{padding:6px 14px;border-radius:7px;border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer}.btn:hover{border-color:#999}
.btn-g{background:var(--grn);color:#fff;border-color:var(--grn)}.btn-g:hover{opacity:.88}
.btn-b{background:var(--blu);color:#fff;border-color:var(--blu)}.btn-b:hover{opacity:.88}
textarea{width:100%;padding:12px;border:2px dashed var(--bd);border-radius:10px;font-family:var(--mono);font-size:11px;line-height:1.7;color:var(--tx);background:var(--sf2);resize:vertical;outline:none}textarea:focus{border-color:var(--grn)}
.hint{background:#fef9ec;border:1px solid #f0e4b8;border-radius:8px;padding:10px 14px;font-size:11px;color:#8a6d0b;margin-bottom:12px;line-height:1.6}
.result{background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:14px;font-family:var(--mono);font-size:13px;line-height:1.9;white-space:pre-wrap;max-height:55vh;overflow-y:auto;user-select:all}
.filter-row{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.fbtn{padding:4px 12px;border-radius:16px;border:1px solid var(--bd);background:var(--sf);font-family:var(--sans);font-size:11px;font-weight:600;color:var(--dm);cursor:pointer}.fbtn.on{background:var(--grn);color:#fff;border-color:var(--grn)}
.search{padding:5px 10px;border:1px solid var(--bd);border-radius:7px;font-size:11px;width:160px;outline:none;font-family:var(--sans)}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dm);border-bottom:1px solid var(--bd);background:var(--sf2);white-space:nowrap}
td{padding:7px 10px;border-bottom:1px solid #f0ede6}tr:hover td{background:var(--sf2)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}.tag-mo{background:var(--mo-bg);color:var(--mo)}.tag-pc{background:var(--pc-bg);color:var(--pc)}
.mono{font-family:var(--mono);font-size:11px}.trunc{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act{padding:3px 7px;border:1px solid var(--bd);border-radius:4px;background:var(--sf);font-size:10px;cursor:pointer;font-family:var(--sans);color:var(--dm);font-weight:600}.act:hover{border-color:var(--blu);color:var(--blu)}
.st-btn{padding:4px 12px;border-radius:6px;border:2px solid;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);min-width:70px;text-align:center}.st-btn:hover{opacity:.8}
.st-wait{background:#fef9ec;color:var(--amb);border-color:#f0d68a}.st-ship{background:#eff4ff;color:var(--blu);border-color:#a8c4f0}.st-done{background:var(--grn-bg);color:var(--grn);border-color:#8cc4a0}.st-cancel{background:var(--pc-bg);color:var(--pc);border-color:#e8a8a4}
.toggle-off{padding:3px 10px;border-radius:5px;border:1px solid var(--bd);background:var(--sf2);color:var(--dm);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--sans)}
.toggle-on{padding:3px 10px;border-radius:5px;border:2px solid var(--grn);background:var(--grn-bg);color:var(--grn);font-size:10px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.fee-input{width:68px;padding:3px 6px;border:2px solid var(--grn);border-radius:4px;font-size:11px;font-family:var(--mono);text-align:right;outline:none}
.total-cell{font-family:var(--mono);font-weight:800;color:var(--grn);font-size:12px}
.stats-g{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:14px;border-top:3px solid var(--grn)}.stat.smo{border-top-color:var(--mo)}.stat.spc{border-top-color:var(--pc)}.stat.sall{border-top-color:#7c3aed}
.stat-l{font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.5px}.stat-v{font-size:22px;font-weight:900;font-family:var(--mono);margin-top:3px}.stat-s{font-size:11px;color:var(--dm);margin-top:2px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--sf);border-radius:14px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.15)}.modal h3{font-size:15px;font-weight:700;margin-bottom:12px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}.fg.full{grid-template-columns:1fr}
.fi label{display:block;font-size:10px;font-weight:700;color:var(--dm);margin-bottom:3px}.fi input,.fi select,.fi textarea{width:100%;padding:6px 10px;border:1px solid var(--bd);border-radius:6px;font-size:12px;font-family:var(--sans);outline:none}.fi textarea{resize:none;min-height:50px}
.modal-ft{display:flex;justify-content:flex-end;gap:8px;margin-top:14px}
.sched-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px}
.sched-btn{padding:4px 10px;border-radius:5px;border:1px solid var(--bd);background:var(--sf);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--sans);color:var(--dm)}.sched-btn.picked{background:var(--blu);color:#fff;border-color:var(--blu)}.sched-btn.weekend{border-color:var(--pc)}
.total-box{background:#eef7f1;border:2px solid #8cc4a0;border-radius:8px;padding:10px 14px;text-align:center;margin-top:10px}.total-box .t-label{font-size:10px;color:var(--dm);font-weight:700}.total-box .t-val{font-size:24px;font-weight:900;font-family:var(--mono);color:var(--grn)}
@media(max-width:768px){
.main{padding:8px}
.stats-g{grid-template-columns:1fr 1fr}
.fg{grid-template-columns:1fr}
.hdr{padding:10px 12px}
.hdr h1{font-size:14px}
.hdr h1 small{display:none}
.tabs{padding:0 4px;gap:4px}
.tab{padding:10px 8px;font-size:11px;flex:1;white-space:nowrap}
.tab .badge{display:none}
.card-h{padding:10px 12px}
.card-h h3{font-size:13px}
.card-b{padding:12px}
.btn{padding:8px 12px;font-size:12px;min-height:36px}
.fbtn{padding:6px 10px;font-size:10px;min-height:30px}
table{font-size:10px}
th,td{padding:6px 5px}
.act,.toggle-on,.toggle-off,.st-btn{min-height:30px;padding:5px 8px;font-size:10px}
.fee-input{width:50px!important;font-size:11px}
.batch-bar{flex-wrap:wrap;padding:8px;font-size:11px}
.batch-bar button{padding:6px 8px;font-size:11px;min-height:32px}
.modal{max-width:95vw;padding:14px;max-height:90vh}
/* Hide secondary columns on phone — keep date/platform/product/name/total/status/actions */
.tab-list-mobile-hide{display:none}
}
</style>
</head>
<body>
<div class="hdr"><h1>📦 訂單管理系統<small>MOMO + PChome</small></h1><div style="display:flex;align-items:center;gap:8px"><span id="sync-badge" class="sync-dot sync-off"><span class="dot dot-off"></span>連線中...</span><button class="btn" onclick="location.reload()" style="font-size:11px">🔄</button><button class="btn" onclick="if(confirm('確定清空？')){orders=[];saveAll()}" style="font-size:11px">清空</button></div></div>
<div class="tabs"><button class="tab active" onclick="showTab('import')">📋 匯入</button><button class="tab" onclick="showTab('list')">📦 列表 <span class="badge" id="cnt">0</span></button><button class="tab" onclick="showTab('output')">📤 輸出</button><button class="tab" onclick="showTab('stats')">📊 統計</button><button class="tab" onclick="showTab('customers')">👥 客戶</button></div>

<div class="main" id="tab-import"><div class="card" style="background:linear-gradient(135deg,#fef0f5,#fff);border:1px solid #f0c4d8"><div class="card-h" style="background:transparent"><h3>🚀 自動抓取 MOMO 訂單（API 直連，無需貼上）</h3><div style="display:flex;gap:6px"><button class="btn" onclick="resetMomoApi()" title="重設 API 網址 / Token">⚙️</button><button class="btn btn-g" id="momo-auto-btn" onclick="fetchMomoAuto()" style="background:var(--mo);border-color:var(--mo)">🔄 自動抓 MOMO 未出貨訂單</button></div></div><div class="card-b" style="padding:10px 16px"><div id="momo-auto-status" style="font-size:11px;color:var(--dm);font-family:var(--mono)">第一次按會問你 API 網址跟 Token，之後直接點按鈕就抓</div></div></div>
<div class="card"><div class="card-h"><h3>貼上後台資料（自動辨識 MO / PC）</h3><div style="display:flex;gap:6px"><button class="btn" onclick="clearInput()">清空</button><button class="btn btn-b" onclick="runParse()">預覽</button><button class="btn btn-g" onclick="doImport()">匯入雲端</button></div></div><div class="card-b"><div class="hint"><b>MOMO：</b>SCM 後台 → Ctrl+A → Ctrl+C → 貼下方<br><b>PChome：</b>供應商後台 → Ctrl+A → Ctrl+C → 貼下方</div><textarea id="raw-input" rows="7" placeholder="把 MOMO 或 PChome 後台訂單資料貼在這裡..."></textarea></div></div><div id="preview-area"></div></div>

<div class="main hidden" id="tab-list"><div class="filter-row"><button class="fbtn on" onclick="setF('all',this)">全部</button><button class="fbtn" onclick="setF('MO',this)">MOMO</button><button class="fbtn" onclick="setF('PC',this)">PChome</button><span style="color:var(--ht)">｜</span><button class="fbtn on" onclick="setSF('all',this)">全狀態</button><button class="fbtn" onclick="setSF('待出貨',this)">待出貨</button><button class="fbtn" onclick="setSF('已出貨',this)">已出貨</button><button class="fbtn" onclick="setSF('已完成',this)">已完成</button><span style="color:var(--ht)">｜</span><button class="fbtn" onclick="toggleSpecial('changeAddr',this)" title="只看客戶有申請改地址的訂單">⚠️ 改址</button><button class="fbtn" onclick="toggleSpecial('newToday',this)" title="只看今日新單">🆕 今日</button><span style="flex:1"></span><input class="search" id="q" placeholder="搜尋..." oninput="renderList()"></div><div id="list-area"></div></div>

<div class="main hidden" id="tab-output"><div class="card"><div class="card-h"><h3>整理格式（MO 含電話 / PC 不含電話）</h3><button class="btn btn-g" onclick="copyOutput()">📋 複製全部</button></div><div class="card-b"><div class="result" id="output-area">尚無訂單</div></div></div></div>
<div class="main hidden" id="tab-stats"><div class="filter-row" style="margin-bottom:14px"><span style="font-size:12px;color:var(--dm);font-weight:600">📅 期間：</span><button class="fbtn" onclick="setStatsPeriod('today',this)">今日</button><button class="fbtn" onclick="setStatsPeriod('7',this)">7 天</button><button class="fbtn on" onclick="setStatsPeriod('30',this)">30 天</button><button class="fbtn" onclick="setStatsPeriod('90',this)">3 個月</button><button class="fbtn" onclick="setStatsPeriod('all',this)">全部</button></div><div id="stats-area"></div></div>
<div class="main hidden" id="tab-customers"><div class="filter-row" style="margin-bottom:10px"><input class="search" id="cq" placeholder="搜尋客戶（姓名/電話/地址）..." oninput="renderCustomers()" style="width:240px"><span style="flex:1"></span><span class="stat" style="font-size:11px;color:var(--dm)">共 <strong id="ccnt">0</strong> 位客戶</span></div><div id="cust-area"></div></div>
<div class="overlay hidden" id="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" id="modal-body"></div></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// ===== FIREBASE CONFIG (你的專案設定) =====
firebase.initializeApp({
  apiKey:"AIzaSyBFIekk-vqXwYlnwBSRqJ6LtIq1vgInOaI",
  authDomain:"order-system-dddca.firebaseapp.com",
  databaseURL:"https://order-system-dddca-default-rtdb.firebaseio.com",
  projectId:"order-system-dddca"
});
const db=firebase.database();
let orders=[],cFilter='all',cStatus='all',editIdx=-1,sortOrder='date-desc',cSpecial=null,statsPeriod='30';
const selectedIds=new Set();
const ST=['待出貨','已出貨','已完成','已取消'],DAYS=['週一','週二','週三','週四','週五','週六','週日'],TIMES=['早上','下午','晚上'];

// Realtime listener
db.ref('orders').on('value',snap=>{orders=snap.val()?Object.values(snap.val()):[];updateCnt();
const at=document.querySelector('.tab.active')?.textContent||'';
if(at.includes('列表'))renderList();if(at.includes('輸出'))renderOutput();if(at.includes('統計'))renderStats();if(at.includes('客戶'))renderCustomers();
document.getElementById('sync-badge').className='sync-dot sync-on';document.getElementById('sync-badge').innerHTML='<span class="dot dot-on"></span>雲端同步'});

function saveAll(){document.getElementById('sync-badge').className='sync-dot sync-off';document.getElementById('sync-badge').innerHTML='<span class="dot dot-off"></span>儲存中...';const d={};orders.forEach(o=>{d[o.id]=o});db.ref('orders').set(d)}

// ===== PARSERS =====
function detect(r){if(r.includes('公克')||r.includes('一般訂單(約配)')||/\d+\(•\)/.test(r))return'MO';if(r.includes('看電話')||r.includes('廠商料號')||r.includes('DEBJ'))return'PC';return'AUTO'}
function parseAll(r){if(!r?.trim())return[];const p=detect(r);if(p==='PC')return parsePC(r);if(p==='MO')return parseMO(r);const pc=parsePC(r),mo=parseMO(r);return pc.length>=mo.length?pc:mo}
function parsePC(raw){const lines=raw.split('\n'),res=[],ol=[];for(let i=0;i<lines.length;i++){const m=lines[i].trim().match(/^(2026\d{7,10}-\d{2})$/);if(m)ol.push({line:i,id:m[1]})}if(!ol.length){const re=/(2026\d{7,10}-\d{2})/g;let m;while((m=re.exec(raw))!==null)ol.push({id:m[1],pos:m.index})}
for(const op of ol){const id=op.id;let bk='';if(op.line!==undefined)bk=lines.slice(Math.max(0,op.line-15),Math.min(lines.length,op.line+30)).join('\t');else bk=raw.substring(Math.max(0,op.pos-500),Math.min(raw.length,op.pos+1500));const c=bk.replace(/\n/g,'\t').replace(/\t{2,}/g,'\t').split('\t').map(x=>x.trim()).filter(Boolean);
let date='';for(const x of c){if(/^\d{2}\/\d{2}$/.test(x)&&x.startsWith('0')){const[mm,dd]=x.split('/');date=parseInt(mm)+'/'+parseInt(dd);break}}
let prod='';for(const x of c){if(x.length>6&&!x.includes('出貨')&&!x.includes('商品名')&&!x.includes('勾選')&&(x.includes('鋼琴')||x.includes('電子琴')||x.includes('音箱')||x.includes('吉他')||x.includes('背帶')||x.includes('混音')||x.includes('鼓')||x.includes('琴')||x.includes('配套')||x.includes('掛勾')||x.includes('ROLAND')||x.includes('Yamaha')||x.includes('YAMAHA')||x.includes('NUX')||x.includes('Ibanez')||x.includes('aNu'))){prod=x;break}}
if(!prod){for(const x of c){if(/^[A-Z0-9]{3,}/.test(x)&&x.length>4&&x.length<60&&(x.includes('琴')||x.includes('組')||x.includes('背帶')||x.includes('調音')||x.includes('音箱')||x.includes('混音'))){prod=x;break}}}
let specs='';for(const x of c){if(/^(黑色|白色|紅色|藍色|原木色|桃紅|黑色保養組|白色保養組)/.test(x)&&x.length<20){specs=x;break}}
let name='';for(let i=0;i<c.length;i++){if(c[i]==='看電話'&&i>0&&/^[\u4e00-\u9fff]{2,5}$/.test(c[i-1])){name=c[i-1];break}}if(!name){for(const x of c){const nm=x.match(/\((.{2,5})寄\)/);if(nm){name=nm[1];break}}}
let addr='';for(const x of c){if(/^[\u4e00-\u9fff]{2,3}(市|縣)/.test(x)&&x.length>8){addr=x.replace(/\s*\(.+寄\)\s*$/,'').trim();break}}
let amt=0,qty=1;const ii=c.indexOf(id);if(ii>=0){const q=parseInt(c[ii+1]);if(/^\d+$/.test(c[ii+1]||'')&&q>=1&&q<=99)qty=q;for(let j=ii+1;j<Math.min(ii+5,c.length);j++){const n=parseInt(c[j]);if(n>100&&/^\d+$/.test(c[j])){amt=n;break}}}
if(id&&(name||prod)){let iso=new Date().toISOString().slice(0,10);if(date){const[mm,dd]=date.split('/');iso=`2026-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`}
res.push({id:gid(),date:iso,dateFmt:date,platform:'PC',orderNo:id,product:prod,specs,name,phone:'',address:addr,install:'否',installFee:0,installDay:'',installTime:'',addon:'否',addonFee:0,amount:amt,qty,status:'待出貨',note:''})}}return res}

function parseMO(raw){const hs=/\d+\(•\)/.test(raw);if(hs){const b=raw.split(/\d+\(•\)/).filter(x=>x.trim().length>30);const r=b.map(parseMOB).filter(Boolean);if(r.length)return r}const re=/(\d{14,}-\d{3}-\d{3}-\d{3})/g,sn=new Set(),h=[];let m;while((m=re.exec(raw))!==null){if(!sn.has(m[1])){sn.add(m[1]);h.push({id:m[1],pos:m.index})}}if(h.length){const r=[];for(let i=0;i<h.length;i++){const o=parseMOB(raw.substring(h[i].pos,i+1<h.length?h[i+1].pos:raw.length));if(o)r.push(o)}if(r.length)return r}const s=parseMOB(raw);return s?[s]:[]}
function parseMOB(bk){let t=bk.replace(/請回覆/g,' ').replace(/請選取[^\n]*/g,' ').replace(/已配送|已確認[^\n]*|已確定[^\n]*|已電聯[^\n]*|多次電聯[^\n]*|暫時電聯[^\n]*/g,' ').replace(/需配送[^\n]*|無貨取消[^\n]*|收件資料[^\n]*|無適當[^\n]*/g,' ').replace(/宅配通|新竹貨運|統一速達|大榮貨運|順豐速運|全球快遞|通盈貨運|新航貨運|郵局|便利袋|富昇物流|其他宅配|宅配-宅配通大電/g,' ').replace(/原箱|momo制式包材-紙箱\(袋\)|momo制式包材-破壞袋|自有包材|循環箱/g,' ').replace(/其他/g,' ').replace(/\n/g,' ').replace(/\s{2,}/g,' ').trim();
const im=t.match(/(\d{14,}-\d{3}-\d{3}-\d{3})/);if(!im)return null;const no=im[1];const dm=t.match(/(\d{4})\/(\d{2})\/(\d{2})\s+\d{2}:\d{2}/);const dt=dm?`${dm[1]}-${dm[2]}-${dm[3]}`:new Date().toISOString().slice(0,10);const df=dm?`${parseInt(dm[2])}/${parseInt(dm[3])}`:'';
let pr='';const pm=t.match(/(【[^】]+】[^)）]*[)）]\)?)/);if(pm)pr=pm[1].trim();
let ac='';if(pr){const ap=t.substring(t.indexOf(pr)+pr.length);const vm=ap.match(/^\s*(\d{3})\s*(黑|白|紅|藍|無|BKN|BS|煙燻黑|[^\d\s]{1,6}?)(?=\s*\d)/);if(vm&&vm[2]&&vm[2]!=='無'){const cm={'黑':'黑色','白':'白色','紅':'紅色','藍':'藍色'};ac=cm[vm[2]]||vm[2]}}
if(pr&&ac){if(pr.includes('黑色/白色')||pr.includes('白色/黑色'))pr=pr.replace(/黑色\/白色|白色\/黑色/,ac);else if(pr.includes('/'))pr=pr.replace(/[^\s(/]+\/[^\s()）]+/,ac)}
const nm=t.match(/([\u4e00-\u9fa5]{2,5})(?=\s*09\d{8})/);const name=nm?nm[1]:'';const ph=t.match(/(09\d{8}#\d+)/);const phone=ph?ph[1]:'';
let addr='';if(phone){const ap=t.substring(t.indexOf(phone)+phone.length).trim();const am=ap.match(/^(\d{3}\s*[\u4e00-\u9fa5][^【]*?)(?:\s*\d{7,}\s*【|\s*\d{7,}|【)/);if(am)addr=am[1].replace(/\s+/g,' ').trim();else{const fb=ap.match(/^(\d{3}\s*[^【]+?)【/);if(fb)addr=fb[1].replace(/\s+/g,' ').replace(/\s*\d{7,}\s*$/,'').trim()}}
if(!no||(!name&&!pr))return null;return{id:gid(),date:dt,dateFmt:df,platform:'MO',orderNo:no,product:pr,specs:'',name,phone,address:addr,install:'否',installFee:0,installDay:'',installTime:'',addon:'否',addonFee:0,amount:0,qty:1,status:'待出貨',note:''}}

function transformMomoOrder(o){let date=new Date().toISOString().slice(0,10),dateFmt='';const dm=(o.lastPricDate||'').match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);if(dm){date=`${dm[1]}-${String(dm[2]).padStart(2,'0')}-${String(dm[3]).padStart(2,'0')}`;dateFmt=`${parseInt(dm[2])}/${parseInt(dm[3])}`}
return{id:gid(),date,dateFmt,platform:'MO',orderNo:o.completeOrderNo||'',product:o.goodsName||'',specs:o.goodsDtInfo||'',name:o.receiver||'',phone:o.receiverMobile||o.receiverTel||'',address:o.newReceiverAddr||o.receiverAddr||'',install:'否',installFee:0,installDay:'',installTime:'',addon:'否',addonFee:0,amount:parseInt(o.salePrice)||parseInt(o.buyPrice)||0,qty:parseInt(o.syslast)||1,status:'待出貨',note:o.newReceiverAddr?'⚠ 客戶申請改地址':''}}

function parseDateRangeInput(s){s=(s||'').trim().toLowerCase();if(!s)return{days:30};if(s==='today'||s==='今天')return{from:isoToday(),to:isoToday()};if(/^\d+$/.test(s))return{days:parseInt(s,10)};const range=s.match(/^(\d{4})[/\-](\d{1,2})[/\-](\d{1,2})\s*[-~至]\s*(\d{4})[/\-](\d{1,2})[/\-](\d{1,2})$/);if(range){return{from:`${range[1]}-${range[2].padStart(2,'0')}-${range[3].padStart(2,'0')}`,to:`${range[4]}-${range[5].padStart(2,'0')}-${range[6].padStart(2,'0')}`}}const single=s.match(/^(\d{4})[/\-](\d{1,2})[/\-](\d{1,2})$/);if(single){const d=`${single[1]}-${single[2].padStart(2,'0')}-${single[3].padStart(2,'0')}`;return{from:d,to:isoToday()}}return null}
function isoToday(){return new Date().toISOString().slice(0,10)}

async function fetchMomoAuto(){
  const api=getMomoApi();if(!api)return;
  const token=getMomoToken();if(!token)return;
  const help='抓哪段日期？以下任一格式：\n\n• 30  → 最近 30 天\n• today  → 只抓今天\n• 2026/4/20  → 從該日到今天\n• 2026/4/20-2026/4/29  → 指定區間\n• (留空 = 最近 30 天)';
  const inp=prompt(help,'30');if(inp===null)return;
  const range=parseDateRangeInput(inp);if(!range){alert('格式不對！請看提示說明');return}
  const btn=document.getElementById('momo-auto-btn'),st=document.getElementById('momo-auto-status');
  const oldText=btn.textContent;btn.disabled=true;btn.textContent='⏳ 抓取中...';st.textContent='📡 從 MOMO API 抓取資料中（最久 30 秒）...';st.style.color='var(--blu)';
  const qs=range.days?`days=${range.days}`:`from=${range.from}&to=${range.to}`;
  const fullUrl=`${api}/api/orders/momo/unsent?${qs}`;
  try{
    const r=await fetch(fullUrl,{headers:{'X-API-Token':token}});
    const ct=r.headers.get('content-type')||'';
    const raw=await r.text();
    if(!ct.includes('application/json')){
      st.textContent=`❌ API 回應不是 JSON（很可能 URL 錯）`;st.style.color='var(--pc)';
      const preview=raw.slice(0,200).replace(/\s+/g,' ');
      alert(`❌ API URL 錯誤\n\n打了：${fullUrl}\nHTTP ${r.status}, Content-Type: ${ct||'(空)'}\n\n回應前 200 字：\n${preview}\n\n👉 按 ⚙️ 重設，正確網址只要 host 不要路徑：\nhttps://momo-integration-production.up.railway.app`);
      return;
    }
    let data;try{data=JSON.parse(raw)}catch(e){alert(`❌ JSON 解析失敗：${e.message}\n\nresponse: ${raw.slice(0,300)}`);return}
    if(!r.ok||!data.ok){
      const msg=data.error||`HTTP ${r.status}`;
      st.textContent=`❌ 抓取失敗：${msg}`;st.style.color='var(--pc)';
      if(r.status===401){alert(`❌ Token 錯誤\n\n${msg}\n\n打了：${fullUrl}\n\n按 ⚙️ 重設 Token`);}else if(r.status===500&&msg.includes('API_TOKEN not configured')){alert(`❌ Server 還沒設 API_TOKEN\n\n進 Railway → momo-integration service → Variables 加：\nName: API_TOKEN\nValue: 任何隨機字串`);}else{alert(`❌ 抓取失敗\n\nHTTP ${r.status}\n${msg}\n\n打了：${fullUrl}`);}
      return;
    }
    const fetched=Array.isArray(data.orders)?data.orders:[];
    if(!fetched.length){st.textContent=`📭 區間 ${data.window?.from} ~ ${data.window?.to} 沒有未出貨訂單`;st.style.color='var(--dm)';alert('區間內沒有未出貨訂單');return}
    const ex=new Set(orders.map(o=>o.orderNo));
    const transformed=fetched.map(transformMomoOrder);
    const nw=transformed.filter(o=>o.orderNo&&!ex.has(o.orderNo));
    const dup=transformed.length-nw.length;
    if(!nw.length){st.textContent=`✅ 抓到 ${fetched.length} 筆，全部已存在（${dup} 筆重複）`;st.style.color='var(--grn)';alert(`區間內 ${fetched.length} 筆訂單，全部已在系統內`);return}
    orders.push(...nw);saveAll();
    st.textContent=`✅ 新增 ${nw.length} 筆${dup?`（${dup} 筆已存在已跳過）`:''}，最後同步 ${new Date().toLocaleTimeString('zh-TW')}`;st.style.color='var(--grn)';
    alert(`🎉 自動抓取成功！\n\n新增訂單：${nw.length} 筆${dup?`\n已存在略過：${dup} 筆`:''}\n區間：${data.window?.from} ~ ${data.window?.to}`);
  }catch(err){
    st.textContent=`❌ 網路錯誤：${err.message}`;st.style.color='var(--pc)';
    alert(`網路錯誤：${err.message}\n\n檢查：\n1. API 網址是否正確（按 ⚙️ 重設）\n2. 網路是否正常\n3. Railway service 是否運行中`);
  }finally{btn.disabled=false;btn.textContent=oldText}
}

function dateBucket(dateStr){if(!dateStr)return'其他';const today=new Date().toISOString().slice(0,10);const yest=new Date(Date.now()-86400000).toISOString().slice(0,10);if(dateStr===today)return'🆕 今天';if(dateStr===yest)return'昨天';const now=new Date();const dow=now.getDay()||7;const startOfWeek=new Date(now.getTime()-(dow-1)*86400000).toISOString().slice(0,10);const startOfLastWeek=new Date(now.getTime()-(dow-1+7)*86400000).toISOString().slice(0,10);if(dateStr>=startOfWeek)return'本週';if(dateStr>=startOfLastWeek)return'上週';const cutoff30=new Date(Date.now()-30*86400000).toISOString().slice(0,10);if(dateStr>=cutoff30)return'本月';return'更早'}

function toggleRowSelected(id){if(selectedIds.has(id))selectedIds.delete(id);else selectedIds.add(id);renderList()}
function toggleAllSelected(e){const checked=e.target.checked;const q=(document.getElementById('q')?.value||'').toLowerCase();const fl=orders.filter(o=>{if(cFilter!=='all'&&o.platform!==cFilter)return false;if(cStatus!=='all'&&o.status!==cStatus)return false;if(cSpecial==='changeAddr'&&!(o.note||'').includes('改地址'))return false;if(cSpecial==='newToday'&&!isNewOrder(o))return false;if(q){const h=[o.orderNo,o.product,o.name,o.phone,o.address,o.note,o.specs].join(' ').toLowerCase();if(!h.includes(q))return false}return true});if(checked)fl.forEach(o=>selectedIds.add(o.id));else fl.forEach(o=>selectedIds.delete(o.id));renderList()}

${o.note?`<div class="row"><span class="lbl">備註</span><span class="val" style="font-size:12px">${esc(o.note).replace(/\n/g,'<br>')}</span></div>`:''}<div class="footer">${o.platform==='MO'?'MOMO':'PChome'} ｜ 印於 ${new Date().toLocaleString('zh-TW')}</div></div>`}).join('')}</body></html>`;w.document.write(html);w.document.close()}

function ordersInPeriod(period){const today=new Date().toISOString().slice(0,10);if(period==='all')return orders.slice();if(period==='today')return orders.filter(o=>o.date===today);const days=parseInt(period,10)||30;const cutoff=new Date(Date.now()-days*86400000).toISOString().slice(0,10);return orders.filter(o=>o.date&&o.date>=cutoff)}
function topN(arr,keyFn,n){const m=new Map();arr.forEach(x=>{const k=keyFn(x);if(!k)return;m.set(k,(m.get(k)||0)+1)});return[...m.entries()].sort((a,b)=>b[1]-a[1]).slice(0,n)}
function renderStats(){const sub=ordersInPeriod(statsPeriod);const mo=sub.filter(o=>o.platform==='MO'),pc=sub.filter(o=>o.platform==='PC');const sales=sub.reduce((s,o)=>s+tot(o),0),inst=sub.reduce((s,o)=>s+(o.installFee||0),0);const wait=sub.filter(o=>o.status==='待出貨').length,ship=sub.filter(o=>o.status==='已出貨').length,done=sub.filter(o=>o.status==='已完成').length;
const topProducts=topN(sub,o=>o.product,10);const topCustomers=(()=>{const m=new Map();sub.forEach(o=>{if(!o.name)return;const cur=m.get(o.name)||{cnt:0,total:0};cur.cnt++;cur.total+=tot(o);m.set(o.name,cur)});return[...m.entries()].sort((a,b)=>b[1].total-a[1].total).slice(0,5)})();
const dayMap=new Map();sub.forEach(o=>{if(!o.date)return;dayMap.set(o.date,(dayMap.get(o.date)||0)+1)});const days=[...dayMap.entries()].sort((a,b)=>a[0]<b[0]?1:-1).slice(0,7);
const periodLabel={'today':'今日','7':'最近 7 天','30':'最近 30 天','90':'最近 3 個月','all':'全部時間'}[statsPeriod];
let html=`<div style="font-size:11px;color:var(--dm);margin-bottom:10px">📅 顯示：<strong>${periodLabel}</strong>，共 ${sub.length} 筆</div><div class="stats-g"><div class="stat sall"><div class="stat-l">總訂單</div><div class="stat-v">${sub.length}</div><div class="stat-s">MO ${mo.length} / PC ${pc.length}</div></div><div class="stat"><div class="stat-l">總金額</div><div class="stat-v" style="color:var(--grn)">$${sales.toLocaleString()}</div><div class="stat-s">平均 $${sub.length?Math.round(sales/sub.length).toLocaleString():0}</div></div><div class="stat"><div class="stat-l">待出貨</div><div class="stat-v" style="color:var(--amb)">${wait}</div><div class="stat-s">已出 ${ship} / 完成 ${done}</div></div><div class="stat"><div class="stat-l">安裝服務</div><div class="stat-v" style="color:var(--blu)">$${inst.toLocaleString()}</div><div class="stat-s">${sub.filter(o=>o.install==='是').length} 筆</div></div></div>`;
if(topProducts.length){html+=`<div class="card" style="margin-top:14px"><div class="card-h"><h3>🏆 熱賣商品 Top ${topProducts.length}</h3></div><div class="card-b" style="padding:8px 14px"><table style="font-size:12px"><thead><tr><th style="width:40px">#</th><th>商品名稱</th><th style="width:80px;text-align:right">銷量</th></tr></thead><tbody>${topProducts.map(([n,c],i)=>`<tr><td class="mono" style="color:var(--dm)">${i+1}</td><td class="trunc" title="${esc(n)}">${esc(n)}</td><td class="mono total-cell" style="text-align:right">${c}</td></tr>`).join('')}</tbody></table></div></div>`}
if(topCustomers.length){html+=`<div class="card" style="margin-top:14px"><div class="card-h"><h3>💰 大客戶 Top 5</h3></div><div class="card-b" style="padding:8px 14px"><table style="font-size:12px"><thead><tr><th style="width:40px">#</th><th>姓名</th><th style="width:60px;text-align:right">次數</th><th style="width:100px;text-align:right">總消費</th></tr></thead><tbody>${topCustomers.map(([n,d],i)=>`<tr><td class="mono" style="color:var(--dm)">${i+1}</td><td>${esc(n)}</td><td class="mono" style="text-align:right">${d.cnt}</td><td class="mono total-cell" style="text-align:right">$${d.total.toLocaleString()}</td></tr>`).join('')}</tbody></table></div></div>`}
if(days.length){const max=Math.max(...days.map(d=>d[1]));html+=`<div class="card" style="margin-top:14px"><div class="card-h"><h3>📈 近 7 個有訂單的日子</h3></div><div class="card-b" style="padding:14px"><div style="font-family:var(--mono);font-size:11px">${days.map(([d,c])=>{const w=Math.round((c/max)*40);return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="width:80px;color:var(--dm)">${d}</span><span style="background:var(--grn);height:14px;width:${w*8}px;display:inline-block;border-radius:2px"></span><span style="margin-left:6px;font-weight:700">${c} 筆</span></div>`}).join('')}</div></div></div>`}
document.getElementById('stats-area').innerHTML=html}

function aggregateCustomers(){const m=new Map();orders.forEach(o=>{const key=(o.name||'')+'||'+(o.phone||'');if(!key.replace(/\|/g,'').trim())return;const cur=m.get(key)||{name:o.name||'',phone:o.phone||'',addresses:new Set(),orders:[],total:0,platforms:new Set(),lastDate:''};cur.orders.push(o);cur.total+=tot(o);cur.platforms.add(o.platform);if(o.address)cur.addresses.add(o.address);if(o.date>cur.lastDate)cur.lastDate=o.date;m.set(key,cur)});return[...m.values()].sort((a,b)=>b.total-a.total)}
function renderCustomers(){const q=(document.getElementById('cq')?.value||'').toLowerCase().trim();const all=aggregateCustomers();const fl=q?all.filter(c=>(c.name+c.phone+[...c.addresses].join(' ')).toLowerCase().includes(q)):all;document.getElementById('ccnt').textContent=fl.length;

1. 預設「DRY RUN 預覽」— 看到會送什麼 payload 才會出現 真送 按鈕<br>
2. 真送後 MOMO 會立即更新訂單狀態，無法復原</div>
<div style="background:var(--sf2);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;font-size:11px;margin-bottom:12px">
<div><b>訂單編號：</b><span class="mono">${esc(o.orderNo)}</span></div>
<div><b>商品：</b>${esc(o.product)}${o.specs?'（'+esc(o.specs)+'）':''} × ${o.qty||1}</div>
<div><b>收件：</b>${esc(o.name)} ｜ ${esc(o.phone)}</div>
<div><b>地址：</b>${esc(o.address)}</div></div>
<div class="fg"><div class="fi"><label>配送狀態 *</label><select id="s-status" onchange="onShipStatusChange()"><option>已配送</option><option>暫時電聯不上(無須momo協助)</option><option>多次電聯不上(2天3次以上)</option><option>需配送加價協調中</option><option>無貨取消訂單</option><option>收件資料有誤/不配送地區</option><option>無適當選項，momo請協助</option></select></div></div>
<div id="ship-shipped"><div class="fg"><div class="fi"><label>物流公司 *</label><select id="s-dely">${MOMO_DELY_COMPANIES.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="fi"><label>配送單號 *</label><input id="s-slip" placeholder="物流單號" style="font-family:var(--mono)" value="${esc(o.trackingNo||'')}"></div></div></div>
<div id="ship-other" class="hidden"><div class="fg full"><div class="fi"><label>配送訊息 *（非已配送必填）</label><textarea id="s-msg" placeholder="例：客戶來電要求改配送日，預計 3/15 配送"></textarea></div></div></div>
<div id="ship-result" style="margin-top:12px"></div>
<div class="modal-ft">
<button class="btn" onclick="closeModal()">取消</button>
<button class="btn btn-b" onclick="submitShip(false)" id="ship-dry-btn">🧪 DRY RUN 預覽</button>
<button class="btn" onclick="submitShip(true)" id="ship-real-btn" style="background:var(--pc);color:#fff;border-color:var(--pc);display:none">⚠️ 確認真送 MOMO</button>
</div>`;
document.getElementById('modal-overlay').classList.remove('hidden')}
function onShipStatusChange(){const s=document.getElementById('s-status').value;document.getElementById('ship-shipped').classList.toggle('hidden',s!=='已配送');document.getElementById('ship-other').classList.toggle('hidden',s==='已配送');document.getElementById('ship-result').innerHTML='';document.getElementById('ship-real-btn').style.display='none'}

async function submitShip(force){
  const o=orders[shipIdx];if(!o)return;
  const status=document.getElementById('s-status').value;
  const item={completeOrderNo:o.orderNo,remark5VStr:status,msgNote:'',delyGbStr:'',slipNo:''};
  if(status==='已配送'){
    item.delyGbStr=document.getElementById('s-dely').value;
    item.slipNo=(document.getElementById('s-slip').value||'').trim();
    if(!item.slipNo){alert('配送單號必填');return}
  }else{
    item.msgNote=(document.getElementById('s-msg').value||'').trim();
    if(!item.msgNote){alert('配送訊息必填（非已配送）');return}
  }
  const api=getMomoApi();const token=getMomoToken();if(!api||!token){alert('需先設定 API URL + Token');return}
  const result=document.getElementById('ship-result');
  result.innerHTML='<div style="color:var(--blu);font-size:12px">處理中...</div>';
  try{
    const r=await fetch(`${api}/api/orders/momo/confirm-shipment${force?'?force=1':''}`,{method:'POST',headers:{'Content-Type':'application/json','X-API-Token':token},body:JSON.stringify({items:[item]})});
    const data=await r.json();
    if(!r.ok||!data.ok){
      result.innerHTML=`<div style="background:var(--pc-bg);border:1px solid var(--pc);color:var(--pc);padding:10px;border-radius:6px;font-size:12px"><b>❌ 失敗</b><br>${esc(data.error||'HTTP '+r.status)}<br><pre style="white-space:pre-wrap;font-size:10px;margin-top:6px">${esc(JSON.stringify(data,null,2).slice(0,500))}</pre></div>`;
      return;
    }
    if(data.dryRun){
      result.innerHTML=`<div style="background:#eff6ff;border:1px solid #93c5fd;color:#1e3a8a;padding:10px;border-radius:6px;font-size:12px"><b>🧪 DRY RUN — 沒有送到 MOMO</b><br>下面這份 payload 是按「真送」會送出的內容：<pre style="white-space:pre-wrap;font-size:10px;margin-top:6px;background:#fff;padding:8px;border-radius:4px">${esc(JSON.stringify(data.wouldSend,null,2))}</pre>確認沒問題就按「⚠️ 確認真送 MOMO」</div>`;
      document.getElementById('ship-real-btn').style.display='inline-block';
      return;
    }
    // Real submit succeeded
    result.innerHTML=`<div style="background:var(--grn-bg);border:1px solid var(--grn);color:var(--grn);padding:10px;border-radius:6px;font-size:12px"><b>✅ MOMO 已收到出貨確認</b><br>HTTP ${data.status} ｜ 重試次數 ${data.attempts||1}<br><pre style="white-space:pre-wrap;font-size:10px;margin-top:6px;background:#fff;padding:8px;border-radius:4px;color:#000">${esc(JSON.stringify(data.data,null,2).slice(0,400))}</pre></div>`;
    // Update local order
    if(status==='已配送'){orders[shipIdx].trackingNo=item.slipNo;orders[shipIdx].delyGbStr=item.delyGbStr;orders[shipIdx].status='已出貨'}
    else if(status==='無貨取消訂單'){orders[shipIdx].status='已取消'}
    orders[shipIdx].note=((orders[shipIdx].note||'')+`\n[出貨回報 ${new Date().toISOString().slice(0,10)}] ${status} ${item.delyGbStr||''} ${item.slipNo||''}`).trim();
    saveAll();renderList();
    setTimeout(()=>{closeModal();alert('✅ 出貨確認完成，訂單狀態已更新為「已出貨」')},800);
  }catch(err){
    result.innerHTML=`<div style="background:var(--pc-bg);border:1px solid var(--pc);color:var(--pc);padding:10px;border-radius:6px;font-size:12px"><b>❌ 網路錯誤</b><br>${esc(err.message)}</div>`;
  }
}
document.getElementById('raw-input')?.addEventListener('paste',()=>setTimeout(runParse,200));
</script>
</body>
</html>
